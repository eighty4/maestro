name: Maestro CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'www/**/*'
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:

  verified:
    runs-on: ubuntu-latest
    needs:
      - build
      - fmt
      - tidy
      - lint
      - test
    steps:
      - run: echo "I can't believe the grass is green"

  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - platform: darwin
            architecture: amd64
          - platform: darwin
            architecture: arm64
          - platform: linux
            architecture: 386
          - platform: linux
            architecture: amd64
          - platform: linux
            architecture: arm
          - platform: linux
            architecture: arm64
          - platform: windows
            architecture: 386
          - platform: windows
            architecture: amd64
          - platform: windows
            architecture: arm64
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: 1.19.5
      - name: build
        run: GOOS=${{matrix.platform}} GOARCH=${{matrix.architecture}} go build

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: 1.19.5
      - name: git config
        run: |
          git config --global init.defaultBranch main
          git config --global user.name "Adam McKee"
          git config --global user.email "adam.be.g84d@gmail.com"
      - name: test
        env:
          MAESTRO_CI: true
          MAESTRO_TEST_GIT: true
        run: go list -f '{{.Dir}}' -m | xargs go test

  fmt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: 1.19.5
      - name: fmt maestro
        run: go fmt .
      - name: fmt composable
        run: |
          cd composable
          go fmt .
      - name: fmt git
        run: |
          cd git
          go fmt .
      - name: fmt testutil
        run: |
          cd testutil
          go fmt .
      - name: fmt util
        run: |
          cd util
          go fmt .
      - name: diff
        run: git diff --exit-code

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: 1.19.5
      - name: install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin
      - name: lint maestro
        run: golangci-lint run
      - name: lint composable
        run: golangci-lint run composable
      - name: lint git
        run: golangci-lint run git
      - name: lint testutil
        run: golangci-lint run testutil
      - name: lint util
        run: golangci-lint run util

  tidy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: 1.19.5
      - name: workspace sync
        run: go work sync
      - name: tidy maestro
        run: go mod tidy
      - name: tidy composable
        run: |
          cd composable
          go mod tidy
      - name: tidy git
        run: |
          cd git
          go mod tidy
      - name: tidy testutil
        run: |
          cd testutil
          go mod tidy
      - name: tidy util
        run: |
          cd util
          go mod tidy
      - name: workspace sync
        run: go work sync
      - name: diff
        run: git diff --exit-code
